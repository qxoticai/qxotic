name: Tok'n'Roll HuggingFace Release

on:
  push:
    tags:
      - 'toknroll-hf-v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: toknroll-hf-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Verify and release toknroll-hf
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
      CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required release secrets
        if: startsWith(github.ref, 'refs/tags/toknroll-hf-v')
        run: |
          test -n "$CENTRAL_TOKEN_USERNAME" || { echo "CENTRAL_TOKEN_USERNAME is required"; exit 1; }
          test -n "$CENTRAL_TOKEN_PASSWORD" || { echo "CENTRAL_TOKEN_PASSWORD is required"; exit 1; }
          test -n "$GPG_PASSPHRASE" || { echo "GPG_PASSPHRASE is required"; exit 1; }
          test -n "${{ secrets.GPG_PRIVATE_KEY }}" || { echo "GPG_PRIVATE_KEY is required"; exit 1; }

      - name: Verify tag matches toknroll-hf version
        if: startsWith(github.ref, 'refs/tags/toknroll-hf-v')
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          pom = ET.parse('toknroll/toknroll-hf/pom.xml').getroot()
          ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
          parent = pom.find('m:parent', ns)
          version = pom.find('m:version', ns)
          if version is None:
              version = parent.find('m:version', ns)
          if version is None or not version.text:
              raise SystemExit('Could not determine toknroll-hf project version from pom.xml')

          expected_tag = f"toknroll-hf-v{version.text.strip()}"
          actual_tag = os.environ['GITHUB_REF_NAME']
          if actual_tag != expected_tag:
              raise SystemExit(
                  f"Tag mismatch: got {actual_tag}, expected {expected_tag} from toknroll/toknroll-hf/pom.xml"
              )
          print(f"Tag/version check passed: {actual_tag}")
          PY

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify formatting and tests
        run: mvn -B -ntp -f toknroll/pom.xml -pl toknroll-hf -am -Dtoknroll.skipDependentTests=true -Dsurefire.excludedGroups=local-external,network,slow spotless:check test

      - name: Set up Maven Central credentials
        if: startsWith(github.ref, 'refs/tags/toknroll-hf-v')
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Deploy toknroll-hf release
        if: startsWith(github.ref, 'refs/tags/toknroll-hf-v')
        run: |
          mvn -B -ntp -f pom.xml -pl toknroll/toknroll-testkit,toknroll/toknroll-core,toknroll/toknroll-hf -am -DskipTests install
          mvn -B -ntp -f toknroll/toknroll-hf/pom.xml -Prelease -DskipTests deploy
