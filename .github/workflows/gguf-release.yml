name: GGUF Release

on:
  push:
    tags:
      - 'gguf-v*'
  workflow_dispatch:

concurrency:
  group: gguf-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify gguf module
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn -B -ntp -pl gguf -am test

  publish:
    name: Publish gguf to Maven Central
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/gguf-v')
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK and Maven Central credentials
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Deploy gguf release
        run: mvn -B -ntp -pl gguf -am -Prelease -DskipTests -Dspotless.check.skip=true deploy
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
