name: GGUF Release

on:
  push:
    tags:
      - 'gguf-v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gguf-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Verify and release gguf
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify formatting and tests
        run: mvn -B -ntp -f gguf/pom.xml spotless:check test

      - name: Set up Maven Central credentials
        if: startsWith(github.ref, 'refs/tags/gguf-v')
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Deploy gguf release
        if: startsWith(github.ref, 'refs/tags/gguf-v')
        run: mvn -B -ntp -f gguf/pom.xml -Prelease -DskipTests deploy
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
