site_name: Safetensors
site_description: A Java library for reading and writing Safetensors headers
repo_url: https://github.com/qxoticai/qxotic
repo_name: qxoticai/qxotic
edit_uri: edit/main/safetensors/docs/

nav:
  - Overview: index.md

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.top
    - navigation.footer
    - toc.follow

markdown_extensions:
  - pymdownx.snippets:
      check_paths: true
      dedent_subsections: true
      base_path:
        - .
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/gruvbox.css
  - stylesheets/syntax.css
