# jam-vector — native-image build configuration.
#
# -H:+VectorAPISupport lets GraalVM's Vector-API support build-time-initialize the species classes, so a
# constant F_SPECIES (and ByteVector.SPECIES_128) can be stored in the image heap — no need to
# --initialize-at-build-time the whole jdk.incubator.vector package. -H:+ForeignAPISupport enables the FFM
# memory ops behind the absolute-addressing segment (VectorSupport.GLOBAL = MemorySegment.NULL.reinterpret).
#
# With those on, build-time-initialize jam-vector's own classes so the species / lane counts / tile & band
# selection / decode fan-out fold to constants. Classes are listed EXPLICITLY (not the whole com.qxotic.jam
# package): jam-native shares the package and must NOT be build-initialized (it resolves FFM downcalls at
# <clinit>). The vector width is fixed at build from -Djam.vector.width / JAM_VECTOR_WIDTH, else the
# -march-implied SPECIES_PREFERRED.
Args = -H:+UnlockExperimentalVMOptions \
       -H:+VectorAPISupport \
       -H:+ForeignAPISupport \
       --initialize-at-build-time=\
  com.qxotic.jam.VectorSupport,\
  com.qxotic.jam.BandGemm,\
  com.qxotic.jam.VectorJAM,\
  com.qxotic.jam.Q8Kernel,\
  com.qxotic.jam.Q4Kernel,\
  com.qxotic.jam.Q4KKernel,\
  com.qxotic.jam.Q5KKernel,\
  com.qxotic.jam.Q6KKernel,\
  com.qxotic.jam.Mxfp4Kernel,\
  com.qxotic.jam.Nvfp4Kernel
